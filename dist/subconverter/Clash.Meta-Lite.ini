; ====================================================================
; Universal Mihomo Rolling LTS (通用大一统滚动生命周期转换模板 - 纯扁平版)
; ====================================================================
; Version      : 2026.07.02 (Stable-Flat)
; Review Date  : 2026-07
; Next Review  : 2027-01
; Compatible   : OpenClash / FlClash / Clash Verge Rev / Mihomo Party
; --------------------------------------------------------------------
; 📌 SCOPE & BOUNDARY DECLARATION (边界宣告)
; This template ONLY defines compilation-time subscription conversion behavior.
; Runtime configurations (DNS / TUN / WireGuard / Sniffer / Proxies Speedtest)
; are intentionally OUT OF SCOPE. Manage them via your local client profile.
; --------------------------------------------------------------------
; 🧭 Flat Version Specifics:
; This version completely strips the Region Definition block to provide
; a minimalist UI, ideal for mobile devices or single-VPS users.
; ====================================================================

[custom]
; ==================== SECTION 1: CONVERTER FLAGS ====================
enable_rule_generator=true
overwrite_original_rules=true

; ==================== SECTION 2: RULESET (Rolling Contract) ====================
; ----- LAYER 0: 最高优先级直连 -----
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOIP,lan,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,apple-cn
; 🛠️ 核心修正：GEOSITE 库无 microsoft-cn，采用兼容性最高、 consensus 最强的标签顺位拦截
ruleset=🎯 全球直连,[]GEOSITE,microsoft@cn
ruleset=🎯 全球直连,[]GEOSITE,google-cn

; ----- LAYER 1: 核心原子服务 -----
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🚀 GitHub,[]GEOSITE,gitlab
ruleset=🇬 Google,[]GEOSITE,google
ruleset=🇬 Google,[]GEOIP,google,no-resolve
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=🚀 节点选择,[]GEOSITE,cloudflare

ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=📹 YouTube,[]GEOIP,youtube,no-resolve
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=💳 PayPal,[]GEOSITE,paypal

; ----- LAYER 2: Modern (高共识组合大包 & 确定性 AI 白名单) -----
ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,anthropic
ruleset=🤖 AI服务,[]GEOSITE,deepseek
ruleset=🤖 AI服务,[]GEOSITE,google
ruleset=🤖 AI服务,[]GEOSITE,perplexity

ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=💾 OneDrive,[]GEOSITE,onedrive
; ruleset=📧 Email,[]GEOSITE,email

; ----- LAYER 3: External Maturity (成熟第三方规则源) -----
ruleset=🎮 游戏平台,clash-classic:https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/SteamCN.yaml,28800
ruleset=🎮 游戏平台,[]GEOSITE,steam

; ----- LAYER 4: Fallback -----
ruleset=🐟 漏网之鱼,[]FINAL


; ==================== SECTION 3: CUSTOM PROXY GROUP ====================

; === Basic (基础核心组) ===
custom_proxy_group=⚡️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 节点选择`select`[]⚡️ 自动选择`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; === Optional Infrastructure ===
custom_proxy_group=🧩 DNS`select`[]🎯 全球直连

; === Service (五级拓扑菜单：1. 互联网服务 - 纯扁平向下依赖) ===
; ⚙️ 纯扁平逻辑优化：尾部一律使用反引号隔离 `.* 确保直接拉取全量原始节点且不污染 UI
custom_proxy_group=🤖 AI服务`select`[]🚀 节点选择`[]⚡️ 自动选择`.*
custom_proxy_group=💬 即时通讯`select`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=🌐 社交媒体`select`[]⚡️ 自动选择`[]🚀 节点选择`.*

; === Platform (五级拓扑菜单：2. 互联网平台) ===
custom_proxy_group=🇬 Google`select`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=🍎 Apple`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=Ⓜ️ Microsoft`select`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🚀 GitHub`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*

; === Streaming (五级拓扑菜单：3. 流媒体平台) ===
custom_proxy_group=📹 YouTube`select`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]⚡️ 自动选择`.*
custom_proxy_group=🎬 Disney+`select`[]🚀 节点选择`[]⚡️ 自动选择`.*
custom_proxy_group=🎵 Spotify`select`[]⚡️ 自动选择`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🎶 TikTok`select`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=📺 Bahamut`select`[]🚀 节点选择`[]⚡️ 自动选择`[]🎯 全球直连`.*

; === Tool & Optional (五级拓扑菜单：4. 工具平台与可选扩展) ===
custom_proxy_group=💾 OneDrive`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=💳 PayPal`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*
custom_proxy_group=🎮 游戏平台`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*
; custom_proxy_group=📧 Email`select`[]🎯 全球直连`[]⚡️ 自动选择`[]🚀 节点选择`.*

; === Fallback (五级拓扑菜单：5. 基础保底流向) ===
custom_proxy_group=🐟 漏网之鱼`select`[]⚡️ 自动选择`[]🚀 节点选择`[]🎯 全球直连`.*