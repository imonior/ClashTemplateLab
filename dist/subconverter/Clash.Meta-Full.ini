; === Streaming (五级拓扑菜单：3. 流媒体平台) ===
custom_proxy_group=📹 YouTube`select`[]⚡️ 自动选择`[]🚀 节点选择
custom_proxy_group=🎥 Netflix`select`[]🇸🇬 新加坡组`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]⚡️ 自动选择`[]🚀 节点选择
