; ====================================================================
; Universal Mihomo Rolling LTS (通用大一统滚动生命周期转换模板)
; ====================================================================
; Version      : 2026.07.03 (Enhanced & Clean)
; Review Date  : 2026-07
; Compatible   : OpenClash / FlClash / Clash Verge Rev / Mihomo Party
; --------------------------------------------------------------------
; 📌 DESIGN PRINCIPLE (设计原理)
; 1. 顶层特赦：专门拔高 Copilot 与特定 AI 的优先级，防止被国内大包拦截。
; 2. 跨代结合：底层使用 MetaCubeX 官方大包，核心服务（AI/苹果/微软）
;    热插拔替换为 BlackMatrix7 的不讲道理、去沙盒、分流精细化规则集。
; ====================================================================

[custom]
; ==================== SECTION 1: CONVERTER FLAGS ====================
enable_rule_generator=true
overwrite_original_rules=true

; ==================== SECTION 2: RULESET (Rolling Contract) ====================
; 🌟 【特赦层】强制覆盖：阻止 Copilot 掉入顶层 microsoft@cn 的直连死结
ruleset=🤖 AI服务,clash-domain:copilot.microsoft.com,sydney.bing.com

; ----- LAYER 0: 最高优先级直连 (原子防漏盾) -----
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOIP,lan,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,apple-cn
; GEOSITE 库无 microsoft-cn，采用高 consensus 标签顺位拦截
ruleset=🎯 全球直连,[]GEOSITE,microsoft@cn
ruleset=🎯 全球直连,[]GEOSITE,google-cn

; ----- LAYER 1: 核心原子服务 (引入 BlackMatrix7 顶级清洗源) -----
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🚀 GitHub,[]GEOSITE,gitlab

; Google 服务：采用 BlackMatrix7 清洗过的分流规则，规避大陆直连重叠部分
ruleset=🇬 Google,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml,28800
ruleset=🇬 Google,[]GEOIP,google,no-resolve

; Apple 服务：采用 BlackMatrix7 的 Apple_All_No_Local（除中国大陆本地化加速外的所有苹果海外服务）
ruleset=🍎 Apple,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/Apple/Apple_All_No_Local.yaml,28800

; Microsoft 服务：采用 BlackMatrix7 的微软海外全量包（排除国内本地 CDN 加速）
ruleset=Ⓜ️ Microsoft,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.yaml,28800

; ----- 流媒体与特定业务 -----
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=📹 YouTube,[]GEOIP,youtube,no-resolve
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=💳 PayPal,[]GEOSITE,paypal

; ----- LAYER 2: Modern (高共识组合大包 & 确定性 AI 爬虫白名单) -----
; OpenAI / DeepSeek 等 AI 分流完美替换为 BlackMatrix7 精准高频规则集
ruleset=🤖 AI服务,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml,28800
ruleset=🤖 AI服务,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/Claude/Claude.yaml,28800
ruleset=🤖 AI服务,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/DeepSeek/DeepSeek.yaml,28800
ruleset=🤖 AI服务,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/Perplexity/Perplexity.yaml,28800
ruleset=🤖 AI服务,[]GEOSITE,anthropic
ruleset=🤖 AI服务,[]GEOSITE,perplexity

ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=💾 OneDrive,[]GEOSITE,onedrive

; ----- LAYER 3: External Maturity (成熟第三方规则源 · 治理长尾) -----
ruleset=🎮 游戏平台,clash-classic:https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/SteamCN.yaml,28800
ruleset=🎮 游戏平台,[]GEOSITE,steam

; ----- LAYER 4: Fallback (绝对兜底) -----
ruleset=🐟 漏网之鱼,[]FINAL


; ==================== SECTION 3: CUSTOM PROXY GROUP ====================

; === Basic (基础核心组) ===
custom_proxy_group=⚡️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 节点选择`select`[]⚡️ 自动选择`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; === Optional Infrastructure (安全占位选单) ===
custom_proxy_group=🧩 DNS`select`[]🎯 全球直连

; === Region Definition (地区定义归类块 · 现代机场缩写防御线) ===
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(HK|Hong.*Kong|香港|HKG|九龙|沙田|深港|沪港|广港|HKBN|HKT|HGC)`https://www.gstatic.com/generate_204`300,,50`().*
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(JP|Japan|日本|东京|大阪|埼玉|NRT|HND|KIX|川日|泉日|TYO|JPN)`https://www.gstatic.com/generate_204`300,,50`().*
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(US|USA|United.*States|美国|洛杉矶|硅谷|波特兰|拉斯|LAX|SJC|SEA|DFW|NYC|USA-)`https://www.gstatic.com/generate_204`300,,50`().*
custom_proxy_group=🇸🇬 新加坡组`url-test`(?i)(SG|Singapore|新加坡|狮城|SIN)`https://www.gstatic.com/generate_204`300,,50`().*
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)(TW|Taiwan|台湾|台北|新北|高雄|TPE|KHH|ROC)`https://www.gstatic.com/generate_204`300,,50`().*

