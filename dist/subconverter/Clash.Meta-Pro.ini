[custom]
; ==================== SECTION 1: CONVERTER FLAGS ====================
enable_rule_generator=true
overwrite_original_rules=true

; ==================== SECTION 2: RULESET (Rolling Contract) ====================
; 🌟 【特赦层】由于拥有独立策略组，以下规则在编译时绝不会被合并，100% 优先命中
ruleset=🤖 Copilot,clash-domain:copilot.microsoft.com,sydney.bing.com,msn.com
ruleset=🤖 ChatGPT,clash-classic:https://fastly.jsdelivr.net/gh/BlackMatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml,28800
