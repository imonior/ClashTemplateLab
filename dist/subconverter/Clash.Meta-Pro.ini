[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ==================== SECTION 2: RULESET ====================
; 🌟 【特赦与高优层】通过独立策略组，编译绝对不合并，强行拿回第一顺位执行权

; 1. 拦截 GitHub 全家桶走代理
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🚀 GitHub,[]GEOSITE,gitlab

; 2. 🌟 核心拆分：所有 AI 服务完全解耦独立，强行截胡顶部的国内直连大包
ruleset=🤖 Copilot,clash-domain:copilot.microsoft.com,sydney.bing.com,msn.com
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🐳 DeepSeek,[]GEOSITE,deepseek
ruleset=🐦 Claude,[]GEOSITE,anthropic
ruleset=🔍 Perplexity,[]GEOSITE,perplexity

; ----- LAYER 0: 最高优先级直连 (原子防漏盾) -----
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOIP,lan,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,apple-cn
ruleset=🎯 全球直连,[]GEOSITE,microsoft@cn
ruleset=🎯 全球直连,[]GEOSITE,google-cn

; ----- LAYER 1: 核心原子服务 -----
ruleset=🇬 Google,[]GEOSITE,google
ruleset=🇬 Google,[]GEOIP,google,no-resolve
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=🚀 节点选择,[]GEOSITE,cloudflare

; ----- 流媒体与特定业务 -----
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=📹 YouTube,[]GEOIP,youtube,no-resolve
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=💳 PayPal,[]GEOSITE,paypal

; ----- LAYER 2: 长尾社交媒体与通讯 -----
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=💾 OneDrive,[]GEOSITE,onedrive

; ----- LAYER 3: 游戏平台 -----
ruleset=🎮 游戏平台,clash-classic:https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/SteamCN.yaml,28800
ruleset=🎮 游戏平台,[]GEOSITE,steam

; ----- LAYER 4: Fallback -----
ruleset=🐟 漏网之鱼,[]FINAL


; ==================== SECTION 3: CUSTOM PROXY GROUP ====================

; === Basic ===
custom_proxy_group=⚡️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,50,10
custom_proxy_group=🚀 节点选择`select`[]⚡️ 自动选择`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🧩 DNS`select`[]🎯 全球直连

; === Region Definition (测速规范化) ===
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(HK|Hong.*Kong|香港|HKG|九龙|沙田|深港)`https://www.gstatic.com/generate_204`300,50,10`().*
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(JP|Japan|日本|东京|大阪|NRT|HND|KIX)`https://www.gstatic.com/generate_204`300,50,10`().*
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(US|USA|United.*States|美国|洛杉矶|硅谷|LAX|SJC)`https://www.gstatic.com/generate_204`300,50,10`().*
custom_proxy_group=🇸🇬 新加坡组`url-test`(?i)(SG|Singapore|新加坡|狮城|SIN)`https://www.gstatic.com/generate_204`300,50,10`().*
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)(TW|Taiwan|台湾|台北|新北|TPE|ROC)`https://www.gstatic.com/generate_204`300,50,10`().*

